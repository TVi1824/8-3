<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>Chúc Mừng 8/3 💐</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Nunito:wght@300;400;600&display=swap');
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    body{font-family:'Nunito',Helvetica,sans-serif;min-height:100vh;background:linear-gradient(135deg,#fce7f3 0%,#ffe4e6 50%,#fdf2f8 100%);overflow-x:hidden}

    /* BLOBS */
    .blob{position:fixed;border-radius:50%;filter:blur(60px);opacity:.45;pointer-events:none;z-index:0;animation:blobMove 10s ease-in-out infinite alternate}
    .b1{width:380px;height:380px;background:#FBCFE8;top:-80px;left:-80px}
    .b2{width:320px;height:320px;background:#FDA4AF;bottom:-60px;right:-60px;animation-delay:3s}
    .b3{width:260px;height:260px;background:#f9a8d4;top:38%;left:32%;animation-delay:6s}
    @keyframes blobMove{0%{transform:translate(0,0) scale(1)}100%{transform:translate(28px,18px) scale(1.1)}}

    /* FLOATING */
    .fw{position:fixed;inset:0;pointer-events:none;z-index:1;overflow:hidden}
    .fi{position:absolute;opacity:0;animation:floatUp linear infinite;font-size:1.4rem}
    @keyframes floatUp{0%{transform:translateY(108vh) rotate(0deg);opacity:0}10%{opacity:.85}90%{opacity:.85}100%{transform:translateY(-8vh) rotate(360deg);opacity:0}}

    /* GLASS */
    .glass{background:rgba(255,255,255,.42);backdrop-filter:blur(22px);-webkit-backdrop-filter:blur(22px);border:1.5px solid rgba(255,255,255,.7);box-shadow:0 8px 40px rgba(244,63,94,.12),0 2px 12px rgba(0,0,0,.05)}

    /* LAYOUT */
    section{position:relative;z-index:2}
    .hero{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:3.5rem 1rem 2rem;gap:1.8rem}

    /* MAIN CARD */
    .mc{border-radius:28px;padding:2rem 1.4rem;max-width:460px;width:100%;text-align:center}
    @media(min-width:420px){.mc{padding:2.4rem 2.2rem}}

    /* HEART SVG */
    .hsvg{display:block;margin:0 auto 1.1rem;animation:hpop 1.6s ease-in-out infinite}
    @keyframes hpop{0%,100%{transform:scale(1);filter:drop-shadow(0 0 5px #FDA4AF)}50%{transform:scale(1.18);filter:drop-shadow(0 0 14px #f43f5e)}}

    /* BADGE */
    .badge{display:inline-block;background:linear-gradient(135deg,#f9a8d4,#FDA4AF);color:#fff;font-size:.68rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;padding:.38rem 1.1rem;border-radius:999px;margin-bottom:1.1rem}

    /* HEADING */
    h1{font-family:'Playfair Display',Georgia,serif;font-size:2.3rem;font-weight:700;color:#f43f5e;line-height:1.2;margin-bottom:.75rem}
    @media(min-width:420px){h1{font-size:2.8rem}}

    /* TYPEWRITER */
    .tw-wrap{display:flex;justify-content:center;margin-bottom:.4rem}
    .tw{font-family:'Playfair Display',Georgia,serif;font-style:italic;font-size:1.55rem;color:#f472b6;display:inline-block;overflow:hidden;white-space:nowrap;border-right:3px solid #f43f5e;animation:typing 2.8s steps(30,end) 1.2s both,blink .8s step-end infinite 1.2s}
    @media(min-width:420px){.tw{font-size:1.9rem}}
    @keyframes typing{from{width:0}to{width:100%}}
    @keyframes blink{from,to{border-color:transparent}50%{border-color:#f43f5e}}

    /* BODY TEXT */
    .bt{color:#fb7185;font-size:.93rem;line-height:1.75;margin-top:.9rem;margin-bottom:1.7rem}
    @media(min-width:420px){.bt{font-size:1.02rem}}

    /* HEARTBEAT SPAN */
    .hb{display:inline-block;animation:hbeat 1.3s ease-in-out infinite}
    @keyframes hbeat{0%,100%{transform:scale(1)}14%{transform:scale(1.28)}28%{transform:scale(1)}42%{transform:scale(1.2)}70%{transform:scale(1)}}

    /* BUTTON */
    .btn{background:linear-gradient(135deg,#f43f5e,#FDA4AF);color:#fff;font-family:'Nunito',sans-serif;font-weight:700;font-size:.97rem;padding:.82rem 2rem;border:none;border-radius:999px;cursor:pointer;box-shadow:0 4px 20px rgba(244,63,94,.4);transition:transform .15s;touch-action:manipulation}
    .btn:active{transform:scale(.95)}

    /* ── FLIP CARD ── */
    .card-hint-txt{text-align:center;color:#f472b6;font-size:.8rem;font-weight:600;letter-spacing:.04em;margin-bottom:.5rem}

    .card-scene{width:100%;max-width:320px;height:195px;cursor:pointer;touch-action:manipulation;position:relative}
    @media(min-width:400px){.card-scene{max-width:355px;height:210px}}

    /* Dùng CSS variable để flip — an toàn nhất trên Android Chrome */
    .card-scene .ci{
      width:100%;height:100%;
      position:relative;
      transform-style:preserve-3d;
      transition:transform .85s cubic-bezier(.4,.2,.2,1);
      will-change:transform;
    }
    .card-scene.flipped .ci{transform:rotateY(180deg)}

    .cf,.cb{
      position:absolute;inset:0;
      border-radius:22px;
      -webkit-backface-visibility:hidden;
      backface-visibility:hidden;
      display:flex;flex-direction:column;
      align-items:center;justify-content:center;
      padding:1.3rem;text-align:center;
    }
    .cf{background:linear-gradient(135deg,#FBCFE8,#FDA4AF);box-shadow:0 10px 32px rgba(244,63,94,.3)}
    .cb{background:linear-gradient(135deg,#fff0f6,#fce7f3);transform:rotateY(180deg);border:2px solid #FDA4AF;box-shadow:0 10px 28px rgba(244,63,94,.15)}

    .cf-title{font-family:'Playfair Display',Georgia,serif;font-size:1.55rem;font-weight:700;color:#fff;text-shadow:0 2px 8px rgba(244,63,94,.3);margin-top:.45rem}
    .cf-sub{color:#fff;font-size:.68rem;opacity:.75;margin-top:.35rem;letter-spacing:.03em}
    .cb-text{font-family:'Playfair Display',Georgia,serif;font-style:italic;color:#f43f5e;font-size:.83rem;line-height:1.65}
    @media(min-width:400px){.cb-text{font-size:.93rem}}
    .cb-sub{color:#fb7185;font-size:.72rem;font-weight:700;margin-top:.65rem;letter-spacing:.04em}

    /* QUOTE */
    .qs{padding:1.5rem 1rem 1rem;display:flex;justify-content:center;position:relative;z-index:2}
    .qc{border-radius:22px;padding:1.6rem 1.4rem;max-width:460px;width:100%;text-align:center}
    .qt{font-family:'Playfair Display',Georgia,serif;font-style:italic;font-size:1.05rem;color:#fb7185;line-height:1.75}
    @media(min-width:420px){.qt{font-size:1.2rem}}
    .qs2{color:#f9a8d4;font-size:.8rem;margin-top:.75rem}

    /* FOOTER */
    footer{padding:1.8rem 1rem;text-align:center;color:#fda4af;font-size:.8rem;position:relative;z-index:2}

    /* AUDIO BTN */
    .abtn{position:fixed;bottom:1.3rem;right:1.3rem;z-index:300;width:50px;height:50px;border-radius:50%;background:linear-gradient(135deg,#FBCFE8,#f43f5e);border:none;cursor:pointer;font-size:1.35rem;box-shadow:0 4px 20px rgba(244,63,94,.45);display:flex;align-items:center;justify-content:center;touch-action:manipulation;transition:transform .15s}
    .abtn:active{transform:scale(.9)}
    .abtn.spin{animation:rspin 3s linear infinite}
    @keyframes rspin{to{transform:rotate(360deg)}}

    /* FADE-UP */
    .fu{opacity:0;transform:translateY(28px);animation:fadeUp .75s ease forwards}
    @keyframes fadeUp{to{opacity:1;transform:translateY(0)}}
    .d1{animation-delay:.15s}.d2{animation-delay:.4s}.d3{animation-delay:.8s}
    .d4{animation-delay:1.2s}.d5{animation-delay:1.7s}.d6{animation-delay:2.1s}
  </style>
</head>
<body>
  <div class="blob b1"></div>
  <div class="blob b2"></div>
  <div class="blob b3"></div>
  <div class="fw" id="fw"></div>
  <button class="abtn" id="aBtn">🎵</button>

    <!-- Main glass card -->
    <div class="mc glass">

          </div>
        </div>
      </div>
    </div>
  </section>

<script>
/* ════════════════════════════════
   1. FLIP CARD — touch + click fix
   ════════════════════════════════ */
var card = document.getElementById('card');
var flipped = false;
var touchMoved = false;

card.addEventListener('touchstart', function(e){
  touchMoved = false;
}, {passive:true});

card.addEventListener('touchmove', function(){
  touchMoved = true;
}, {passive:true});

card.addEventListener('touchend', function(e){
  if(touchMoved) return; // bỏ qua nếu người dùng đang scroll
  e.preventDefault();
  flipped = !flipped;
  card.classList.toggle('flipped', flipped);
}, {passive:false});

card.addEventListener('click', function(){
  flipped = !flipped;
  card.classList.toggle('flipped', flipped);
});

/* ════════════════════════════════
   2. CONFETTI — canvas thuần
   ════════════════════════════════ */
(function(){
  var W=window, D=document, M=Math;
  var pts=[], cv, cx, aid;
  function init(){
    if(cv) return;
    cv=D.createElement('canvas');
    cv.style.cssText='position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999';
    D.body.appendChild(cv); cx=cv.getContext('2d');
    resize(); W.addEventListener('resize',resize);
  }
  function resize(){cv.width=W.innerWidth;cv.height=W.innerHeight}
  var C=['#FBCFE8','#FDA4AF','#f43f5e','#fce7f3','#fff','#f9a8d4'];
  function shoot(cfg){
    init();
    var n=cfg.n||80, ox=cfg.ox!==undefined?cfg.ox:.5, oy=cfg.oy!==undefined?cfg.oy:.55;
    for(var i=0;i<n;i++){
      var a=(cfg.ang!==undefined?cfg.ang:M.random()*360)*M.PI/180;
      var sp=(cfg.sp||70)/100*(7+M.random()*6);
      pts.push({x:ox*cv.width,y:oy*cv.height,
        vx:M.cos(a)*sp*(M.random()-.2),vy:-M.abs(M.sin(a)*sp)-M.random()*4,
        c:C[M.floor(M.random()*C.length)],r:3+M.random()*4,
        li:1,dc:.011+M.random()*.008,
        ro:M.random()*360,rs:(M.random()-.5)*9,
        sq:M.random()>.5});
    }
    if(!aid) loop();
  }
  function loop(){
    cx.clearRect(0,0,cv.width,cv.height);
    pts=pts.filter(function(p){
      p.x+=p.vx;p.y+=p.vy;p.vy+=.16;p.vx*=.99;
      p.li-=p.dc;p.ro+=p.rs;
      cx.save();cx.globalAlpha=M.max(0,p.li);
      cx.translate(p.x,p.y);cx.rotate(p.ro*M.PI/180);
      cx.fillStyle=p.c;
      if(p.sq){cx.fillRect(-p.r,-p.r/2,p.r*2,p.r)}
      else{cx.beginPath();cx.arc(0,0,p.r,0,2*M.PI);cx.fill()}
      cx.restore();
      return p.li>0;
    });
    if(pts.length){aid=requestAnimationFrame(loop)}else{aid=null;cx.clearRect(0,0,cv.width,cv.height)}
  }
  W.fireConfetti=function(){
    shoot({n:85,ox:.5,oy:.55,sp:72});
    setTimeout(function(){shoot({n:55,ang:65,ox:.05,oy:.65,sp:52})},300);
    setTimeout(function(){shoot({n:55,ang:115,ox:.95,oy:.65,sp:52})},300);
    setTimeout(function(){shoot({n:50,ox:.5,oy:.38,sp:108})},720);
  };
})();

setTimeout(function(){fireConfetti()},1600);
document.getElementById('cBtn').addEventListener('click', fireConfetti);

/* ════════════════════════════════
   3. FLOATING EMOJIS
   ════════════════════════════════ */
var EM=['🌸','🌺','🌷','💐','🎀','💝','🌹','✨','🦋','💗','🎁','🍃'];
var fw=document.getElementById('fw');
function spawnFloat(){
  var el=document.createElement('div');
  el.className='fi';
  el.textContent=EM[Math.floor(Math.random()*EM.length)];
  el.style.left=(Math.random()*100)+'vw';
  var d=9+Math.random()*10;
  el.style.animationDuration=d+'s';
  el.style.animationDelay=(Math.random()*3)+'s';
  el.style.fontSize=(1+Math.random()*1.2)+'rem';
  fw.appendChild(el);
  setTimeout(function(){if(el.parentNode)el.remove()},(d+4)*1000);
}
for(var i=0;i<18;i++) setTimeout(spawnFloat,i*280);
setInterval(spawnFloat,950);

/* ════════════════════════════════
   4. NHẠC NỀN — Vui tươi rộn ràng
   Điệu pop/waltz tươi sáng, C major
   BPM 118, staccato, có trống nhẹ
   ════════════════════════════════ */
var AC=null, playing=false, seq=null, beat=0;
var aBtn=document.getElementById('aBtn');

// C major scale: C4 D4 E4 F4 G4 A4 B4 C5 D5 E5 G5
// Giai điệu vui — phong cách happy pop/music box
var MEL=[
  523.25, 587.33, 659.26, 698.46,   // C D E F
  783.99, 783.99, 698.46, 659.26,   // G G F E
  587.33, 523.25, 659.26, 783.99,   // D C E G
  880.00, 783.99, 698.46, 523.25,   // A G F C

  659.26, 783.99, 880.00, 783.99,   // E G A G
  698.46, 659.26, 587.33, 523.25,   // F E D C
  587.33, 659.26, 783.99, 659.26,   // D E G E
  523.25, 523.25, 0,      523.25,   // C C _ C

  523.25, 659.26, 783.99, 1046.50,  // C E G C5
  880.00, 783.99, 659.26, 587.33,   // A G E D
  659.26, 783.99, 523.25, 659.26,   // E G C E
  783.99, 698.46, 587.33, 523.25    // G F D C
];

// Bass: root notes theo hợp âm C-Am-F-G vui tươi
var BASS=[
  130.81,0,130.81,0,  // C
  110.00,0,110.00,0,  // Am → A
  174.61,0,174.61,0,  // F
  196.00,0,196.00,0,  // G
  130.81,0,130.81,0,
  110.00,0,110.00,0,
  174.61,0,174.61,0,
  196.00,0,196.00,0,
  130.81,0,130.81,0,
  110.00,0,110.00,0,
  174.61,0,174.61,0,
  196.00,0,196.00,0
];

// Chord stabs (quãng 3 + 5) — tạo cảm giác rộn ràng
var CHORD=[
  [523.25,659.26],[0,0],[523.25,659.26],[0,0],
  [440.00,554.37],[0,0],[440.00,554.37],[0,0],
  [349.23,440.00],[0,0],[349.23,440.00],[0,0],
  [392.00,493.88],[0,0],[392.00,493.88],[0,0]
];

function note(ctx,freq,t,dur,vol,type){
  if(!freq) return;
  var o=ctx.createOscillator(),g=ctx.createGain();
  o.connect(g);g.connect(ctx.destination);
  o.type=type||'sine';
  o.frequency.setValueAtTime(freq,t);
  g.gain.setValueAtTime(0,t);
  g.gain.linearRampToValueAtTime(vol,t+0.02);
  g.gain.setValueAtTime(vol*0.75,t+dur*0.3);
  g.gain.linearRampToValueAtTime(0,t+dur-0.02);
  o.start(t);o.stop(t+dur);
}

// Tiếng trống nhẹ bằng noise — kick + hihat
function kick(ctx,t){
  var buf=ctx.createBuffer(1,ctx.sampleRate*0.15,ctx.sampleRate);
  var d=buf.getChannelData(0);
  for(var i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,8);
  var src=ctx.createBufferSource(),g=ctx.createGain(),
      f=ctx.createBiquadFilter();
  f.type='lowpass';f.frequency.value=200;
  src.buffer=buf;src.connect(f);f.connect(g);g.connect(ctx.destination);
  g.gain.setValueAtTime(0.22,t);
  g.gain.linearRampToValueAtTime(0,t+0.12);
  src.start(t);src.stop(t+0.15);
}
function hihat(ctx,t){
  var buf=ctx.createBuffer(1,ctx.sampleRate*0.05,ctx.sampleRate);
  var d=buf.getChannelData(0);
  for(var i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,3);
  var src=ctx.createBufferSource(),g=ctx.createGain(),
      f=ctx.createBiquadFilter();
  f.type='highpass';f.frequency.value=8000;
  src.buffer=buf;src.connect(f);f.connect(g);g.connect(ctx.destination);
  g.gain.setValueAtTime(0.07,t);
  g.gain.linearRampToValueAtTime(0,t+0.04);
  src.start(t);src.stop(t+0.05);
}

function startMusic(){
  AC=new(window.AudioContext||window.webkitAudioContext)();
  beat=0;
  var BPM=118, bs=60/BPM; // nhanh vui

  function tick(){
    if(!AC||!playing) return;
    var t=AC.currentTime;

    // Giai điệu chính
    var mf=MEL[beat%MEL.length];
    note(AC,mf,t,bs*0.82,0.12,'sine');
    // Quãng 8 trên — tạo sparkle
    if(mf) note(AC,mf*2,t,bs*0.5,0.04,'sine');

    // Bass
    var bf=BASS[beat%BASS.length];
    note(AC,bf,t,bs*0.6,0.1,'triangle');

    // Chord stab
    var ch=CHORD[beat%CHORD.length];
    if(ch[0]) note(AC,ch[0],t,bs*0.35,0.05,'square');
    if(ch[1]) note(AC,ch[1],t,bs*0.35,0.04,'square');

    // Trống: kick nhịp 1 & 3, hihat mỗi nhịp
    var b4=beat%4;
    if(b4===0||b4===2) kick(AC,t);
    hihat(AC,t);

    beat++;
    seq=setTimeout(tick,bs*1000);
  }
  tick();
}

function stopMusic(){
  playing=false;
  if(seq) clearTimeout(seq);
  if(AC){AC.close();AC=null;}
}

aBtn.addEventListener('click',function(){
  if(playing){stopMusic();aBtn.textContent='🎵';aBtn.classList.remove('spin');}
  else{playing=true;startMusic();aBtn.textContent='🎶';aBtn.classList.add('spin');}
});
</script>
</body>
</html>
